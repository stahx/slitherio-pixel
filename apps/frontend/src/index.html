<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="./output.css"
    />
    <title>Pixel Snake</title>
  </head>
  <body>
    <div id="loading">Ładowanie...</div>
    <div
      id="sound-button"
      class="sound-disabled m-2 text-green fixed top-0 right-0 w-6 h-6 cursor-pointer"
      onclick="game.toggleMusic()"
    ></div>
    <div id="menu">
      <input
        id="name-input"
        type="text"
        placeholder="Nick"
      />
      <button onclick="game.start(document.querySelector('#name-input').value)">
        Play
      </button>
    </div>
    <div id="game">
      <div id="leaderboard">
        <div id="leaderboard-title">Leaderboard</div>
        <div id="leaderboard-content"></div>
      </div>
      <div id="player-data">
        <div id="player-name">nickname</div>
        <div id="points">
          Points:
          <div id="points-amount">0</div>
        </div>
      </div>
      <canvas id="canvas"></canvas>
      <div id="deathscreen">
        <div>
          <div>Nie żyjesz</div>
          <div>
            <button onclick="restart()">Graj od nowa</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

<script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.5.2/dist/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0/axios.min.js"></script>
<script src="./class/GameClient.js"></script>

<script>
  const game = new GameClient();

  function restart() {
    game.start(document.querySelector('#name-input').value);
    document.querySelector('#deathscreen').style.display = 'none';
  }
  // game.start();
</script>
