<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link
      rel="stylesheet"
      href="./output.css"
    />
    <title>Pixel Snake</title>
  </head>
  <body>
    <div
      id="loading"
      class="loading-screen"
    >
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <div>Ładowanie...</div>
      </div>
    </div>
    <div
      id="sound-button"
      class="m-2 fixed top-0 right-0 w-6 h-6 cursor-pointer"
      onclick="game.toggleMusic()"
    >
      <svg
        class="off"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
      >
        <path
          d="M10 7.22056L6.60282 10.0001H3V14.0001H6.60282L10 16.7796V7.22056ZM5.88889 16.0001H2C1.44772 16.0001 1 15.5524 1 15.0001V9.00007C1 8.44778 1.44772 8.00007 2 8.00007H5.88889L11.1834 3.66821C11.3971 3.49335 11.7121 3.52485 11.887 3.73857C11.9601 3.8279 12 3.93977 12 4.05519V19.9449C12 20.2211 11.7761 20.4449 11.5 20.4449C11.3846 20.4449 11.2727 20.405 11.1834 20.3319L5.88889 16.0001ZM20.4142 12.0001L23.9497 15.5356L22.5355 16.9498L19 13.4143L15.4645 16.9498L14.0503 15.5356L17.5858 12.0001L14.0503 8.46454L15.4645 7.05032L19 10.5859L22.5355 7.05032L23.9497 8.46454L20.4142 12.0001Z"
        ></path>
      </svg>

      <svg
        class="on"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        style="display: none"
      >
        <path
          d="M6.60282 10.0001L10 7.22056V16.7796L6.60282 14.0001H3V10.0001H6.60282ZM2 16.0001H5.88889L11.1834 20.3319C11.2727 20.405 11.3846 20.4449 11.5 20.4449C11.7761 20.4449 12 20.2211 12 19.9449V4.05519C12 3.93977 11.9601 3.8279 11.887 3.73857C11.7121 3.52485 11.3971 3.49335 11.1834 3.66821L5.88889 8.00007H2C1.44772 8.00007 1 8.44778 1 9.00007V15.0001C1 15.5524 1.44772 16.0001 2 16.0001ZM23 12C23 15.292 21.5539 18.2463 19.2622 20.2622L17.8445 18.8444C19.7758 17.1937 21 14.7398 21 12C21 9.26016 19.7758 6.80629 17.8445 5.15557L19.2622 3.73779C21.5539 5.75368 23 8.70795 23 12ZM18 12C18 10.0883 17.106 8.38548 15.7133 7.28673L14.2842 8.71584C15.3213 9.43855 16 10.64 16 12C16 13.36 15.3213 14.5614 14.2842 15.2841L15.7133 16.7132C17.106 15.6145 18 13.9116 18 12Z"
        ></path>
      </svg>
    </div>
    <div id="menu">
      <div class="menu-content">
        <h1 class="menu-title">Pixel Snake</h1>
        <input
          id="name-input"
          type="text"
          placeholder="Enter your nickname"
          class="menu-input"
          maxlength="15"
        />
        <button
          onclick="game.start(document.querySelector('#name-input').value)"
          class="menu-button"
        >
          Play
        </button>
        <span class="version-badge"></span>
      </div>
    </div>
    <div
      id="esc-menu"
      style="display: none"
    >
      <div class="esc-menu-content">
        <h2>Pause Menu</h2>
        <button onclick="game.resumeGame()">Resume</button>
        <button onclick="game.returnToMenu()">Return to Menu</button>
        <span class="version-badge"></span>
      </div>
    </div>
    <canvas id="canvas"></canvas>
    <div id="game">
      <div id="leaderboard">
        <div id="leaderboard-title">Leaderboard</div>
        <div id="leaderboard-content"></div>
      </div>
      <div id="player-data">
        <div id="player-name">nickname</div>
        <div id="points">
          Points:
          <div id="points-amount">0</div>
        </div>
      </div>
      <div id="deathscreen">
        <div class="deathscreen-content">
          <div class="deathscreen-title">Nie żyjesz</div>
          <div class="deathscreen-buttons">
            <button onclick="restart()">Graj od nowa</button>
            <button onclick="game.returnToMenu()">Return to Menu</button>
          </div>
        </div>
      </div>
    </div>
    <button
      type="button"
      id="theme-toggle"
      class="theme-toggle"
      title="Theme"
      aria-label="Toggle light or dark theme"
    >
      <svg
        class="icon-when-dark"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        aria-hidden="true"
      >
        <path
          d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z"
        />
        <path
          d="M6.5 9.6h11v1.1c0 .8-.3 1.5-.9 2.1-.6.6-1.3.9-2.1.9h-.4c-.2 0-.4.1-.5.2l-.3.3c-.4.4-1 .5-1.5.2-.1-.1-.2-.1-.3-.2l-.3-.3c-.1-.1-.3-.2-.5-.2h-.4c-.8 0-1.5-.3-2.1-.9-.6-.6-.9-1.3-.9-2.1V9.6z"
          opacity=".85"
        />
      </svg>
      <svg
        class="icon-when-light"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        aria-hidden="true"
      >
        <path
          fill-rule="evenodd"
          d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z"
          clip-rule="evenodd"
        />
      </svg>
    </button>
    <div id="ping-indicator">
      <span id="fps-value"></span>
      <span class="indicator-sep">|</span>
      <span id="ping-value">-- ms</span>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.5.2/dist/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0/axios.min.js"></script>
    <script src="./class/GameClient.js"></script>
    <script
      data-goatcounter="https://slither-stats.stah.dev/count"
      data-goatcounter-settings='{"no_onload": true}'
      src="https://slither-stats.stah.dev/count.js"
    ></script>
    <script>
      const THEME_STORAGE_KEY = 'pixel-snake-theme';

      function readThemeConfig() {
        try {
          const raw = localStorage.getItem(THEME_STORAGE_KEY);
          if (raw) {
            const o = JSON.parse(raw);
            if (o && (o.theme === 'light' || o.theme === 'dark')) return o.theme;
          }
        } catch (_) {}
        const legacy = localStorage.getItem('theme');
        if (legacy === 'light' || legacy === 'dark') {
          writeThemeConfig(legacy);
          localStorage.removeItem('theme');
          return legacy;
        }
        return 'dark';
      }

      function writeThemeConfig(theme) {
        localStorage.setItem(
          THEME_STORAGE_KEY,
          JSON.stringify({ theme }),
        );
      }

      document.documentElement.setAttribute('data-theme', readThemeConfig());

      document.getElementById('theme-toggle').addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-theme') || 'dark';
        if (cur === 'dark') {
          if (
            !confirm(
              'Switch to LIGHT mode? Fair warning: your eyes may send a strongly worded letter. 😂 Proceed?',
            )
          ) {
            return;
          }
          document.documentElement.setAttribute('data-theme', 'light');
          writeThemeConfig('light');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          writeThemeConfig('dark');
        }
      });

      const game = new GameClient();

      fetch('/version')
        .then((r) => r.json())
        .then(({ version }) => {
          document.querySelectorAll('.version-badge').forEach((el) => {
            el.textContent = `v${version}`;
          });
        })
        .catch(() => {});

      function restart() {
        game.start(document.querySelector('#name-input').value);
        document.querySelector('#deathscreen').style.display = 'none';
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && game.isGameRunning()) {
          e.preventDefault();
          game.toggleEscMenu();
        }
      });

      document.addEventListener(
        'wheel',
        (e) => {
          if (e.ctrlKey) {
            e.preventDefault();
          }
        },
        { passive: false },
      );

      document.addEventListener(
        'touchstart',
        (e) => {
          if (e.touches.length > 1) {
            e.preventDefault();
          }
        },
        { passive: false },
      );

      document.addEventListener('gesturestart', (e) => {
        e.preventDefault();
      });

      let lastTouchEnd = 0;
      document.addEventListener(
        'touchend',
        (e) => {
          const now = Date.now();
          if (now - lastTouchEnd <= 300) {
            e.preventDefault();
          }
          lastTouchEnd = now;
        },
        false,
      );

      if (window.goatcounter && goatcounter.count) {
        goatcounter.count();
      }
    </script>
  </body>
</html>
